# Firmware configuration file for the OpenWRT One
#
# Phase 1 status: this file is INTENTIONALLY MINIMAL.
#
# The OpenWRT One boots from SPI NAND via a multi-stage chain
# (BL2 -> fip -> U-Boot -> fit) and the persistent storage is UBI volumes,
# not a single block device. The standard Nerves fwup model assumes raw
# block-device + MBR partitions, which doesn't map directly.
#
# For now, the actual flashable artifact is `openwrt-one-nand.ubi`,
# produced by post-createfs.sh, which you write via U-Boot's `mtd write`.
#
# This .fw file exists so that `mix firmware` doesn't error out and so
# the build pipeline produces a valid Nerves system. Phase 2 will replace
# the placeholder tasks below with real fwup tasks that write to UBI
# volumes via /dev/mtd*/ubi*, enabling `mix upload` for OTA updates with
# A/B slot switching.

require-fwup-version="1.0.0"

include("${NERVES_SDK_IMAGES:-.}/fwup_include/fwup-common.conf")

file-resource Image {
    host-path = "${NERVES_SYSTEM}/images/Image"
}
file-resource mt7981b-openwrt-one.dtb {
    host-path = "${NERVES_SYSTEM}/images/mediatek/mt7981b-openwrt-one.dtb"
}
file-resource rootfs.img {
    host-path = ${ROOTFS}
}
file-resource openwrt-one-initramfs.itb {
    host-path = "${NERVES_SYSTEM}/images/openwrt-one-initramfs.itb"
}

# Placeholder uboot-environment so the standard tasks compile.
# The real U-Boot env on this board lives in two ubootenv UBI volumes
# on SPI NAND and is managed by fw_setenv at runtime, not by fwup
# directly. Phase 2 will rework this.
uboot-environment uboot-env {
    block-offset = 0
    block-count = 16
}

# `complete` is what `mix burn` would invoke. We refuse it because
# you can't burn this system to a generic block device — it must be
# flashed to NAND from U-Boot. See README.md for the procedure.
task complete {
    on-init {
        error("nerves_system_openwrt_one cannot be 'mix burn'-ed to a block device. See README.md for the NAND flashing procedure using openwrt-one-nand.ubi from U-Boot.")
    }
}

# Placeholder upgrade tasks for `mix upload`. These will be implemented
# in Phase 2 once we have UBI volume A/B switching wired up.
task upgrade.a {
    on-init {
        error("OTA upgrade not yet implemented in Phase 1.")
    }
}
task upgrade.b {
    on-init {
        error("OTA upgrade not yet implemented in Phase 1.")
    }
}
