# UBI image configuration for OpenWRT One SPI NAND
#
# Layout matches the OpenWrt 24.10 factory layout so BL2 in SPI NOR
# can find a "fip" volume on SPI NAND and boot the production path:
#
#   BL2 (SPI NOR bl2-nor)
#     -> reads UBI volume "fip" from SPI NAND
#     -> loads BL31 + U-Boot proper from FIP
#   U-Boot
#     -> reads UBI volume "fit" from SPI NAND
#     -> bootm config-1 -> Linux
#
# NAND parameters (from OpenWrt filogic.mk):
#   Block size: 128 KiB (0x20000)
#   Page size:  2048 bytes
#   Sub-page:   0 (not supported on SPI NAND)

[ubootenv]
mode=ubi
vol_id=0
vol_type=dynamic
vol_name=ubootenv
vol_size=128KiB

[ubootenv2]
mode=ubi
vol_id=1
vol_type=dynamic
vol_name=ubootenv2
vol_size=128KiB

[fip]
mode=ubi
vol_id=2
vol_type=static
vol_name=fip
image=BOARD_DIR/prebuilt/openwrt-one-fip.bin

[fit]
mode=ubi
vol_id=3
vol_type=dynamic
vol_name=fit
image=BINARIES_DIR/openwrt-one-initramfs.itb

# rootfs_data exists so OpenWrt's U-Boot ubi_prepare_rootfs script
# (run after `ubi read fit`) doesn't try to create it itself and
# fail with "No space left in UBI device". autoresize lets it
# claim all remaining free space on the partition.
[rootfs_data]
mode=ubi
vol_id=4
vol_type=dynamic
vol_name=rootfs_data
vol_size=1MiB
vol_flags=autoresize
