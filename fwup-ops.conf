# Post-installation firmware operations for the OpenWRT One.
#
# Phase 1: placeholder. Phase 2 will implement factory-reset, revert,
# status, validate, prevent-revert against the UBI volume layout.

require-fwup-version="1.0.0"

include("${NERVES_SDK_IMAGES:-.}/fwup_include/fwup-common.conf")

uboot-environment uboot-env {
    block-offset = 0
    block-count = 16
}

task factory-reset {
    on-init {
        error("factory-reset not yet implemented in Phase 1.")
    }
}

task validate {
    on-init {
        info("Validate (no-op in Phase 1)")
    }
}

task status {
    on-init {
        info("status (no-op in Phase 1)")
    }
}

task revert {
    on-init {
        error("revert not yet implemented in Phase 1.")
    }
}

task prevent-revert {
    on-init {
        error("prevent-revert not yet implemented in Phase 1.")
    }
}
